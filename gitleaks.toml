# Gitleaks configuration for NeuroCognition
# https://github.com/gitleaks/gitleaks

title = "NeuroCognition Gitleaks Configuration"

[extend]
# Extend the default gitleaks configuration
useDefault = true

[[rules]]
id = "private-litellm-url"
description = "Private institutional LiteLLM proxy URL (previously exposed in git history)"
regex = '''litellm\.rum\.uilab\.kr'''
tags = ["private-url", "infrastructure"]
severity = "HIGH"

[[rules]]
id = "openai-api-key"
description = "OpenAI API Key"
regex = '''sk-[a-zA-Z0-9]{32,}'''
tags = ["api-key", "openai"]
severity = "CRITICAL"

[[rules]]
id = "openrouter-api-key"
description = "OpenRouter API Key"
regex = '''(sk-or-v1-|OR-)[a-zA-Z0-9\-]{32,}'''
tags = ["api-key", "openrouter"]
severity = "CRITICAL"

[[rules]]
id = "google-api-key"
description = "Google API Key"
regex = '''AIza[0-9A-Za-z\-_]{35}'''
tags = ["api-key", "google"]
severity = "CRITICAL"

[[rules]]
id = "huggingface-token"
description = "HuggingFace access token"
regex = '''hf_[a-zA-Z0-9]{32,}'''
tags = ["api-key", "huggingface"]
severity = "CRITICAL"

[[rules]]
id = "generic-api-key-assignment"
description = "Generic hardcoded API key assignment"
regex = '''(?i)(api_key|apikey|api-key)\s*=\s*["'][a-zA-Z0-9\-_]{20,}["']'''
tags = ["api-key", "generic"]
severity = "HIGH"

[allowlist]
description = "Global allowlist"
regexes = [
    # Allow environment variable lookups
    '''os\.getenv\(''',
    # Allow placeholder/example values
    '''"your[-_]api[-_]key"''',
    '''"<your[-_]api[-_]key>"''',
    '''"dummy"''',
]
paths = [
    "gitleaks.toml",
    "SECURITY.md",
]
